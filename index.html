<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perfusion AI</title>

<style>
body { font-family: -apple-system; margin: 20px; }
input, select, button { width: 100%; padding: 12px; margin: 6px 0; font-size: 16px; }
button { background: black; color: white; border: none; }
.box { margin-top: 20px; white-space: pre-line; }
</style>
</head>

<body>

<h2>Perfusion AI</h2>

<input id="rbv" placeholder="rCBV">
<input id="ktrans" placeholder="Ktrans">
<input id="adc" placeholder="ADC">
<input id="weeks" placeholder="Settimane RT">

<select id="trend">
<option value="stable">stable</option>
<option value="up">up</option>
<option value="down">down</option>
</select>

<button onclick="calc()">Calcola</button>

<div class="box" id="out"></div>

<script>
function calc(){

let r = parseFloat(document.getElementById("rbv").value);
let k = parseFloat(document.getElementById("ktrans").value);
let a = parseFloat(document.getElementById("adc").value);
let w = parseInt(document.getElementById("weeks").value);
let t = document.getElementById("trend").value;

let score = 0;

// rCBV
if(r < 1) score += 0;
else if(r < 1.75) score += 1;
else if(r < 2.5) score += 2;
else score += 3;

// Ktrans
if(k < 0.05) score += 0;
else if(k < 0.1) score += 1;
else if(k < 0.2) score += 2;
else score += 3;

// ADC
if(a > 1.4) score += 0;
else if(a > 1.2) score += 1;
else if(a > 1.0) score += 2;
else score += 3;

// clinica
if(w < 12) score -= 1;
if(t === "up") score += 1;
if(t === "down") score -= 1;

let dx = "";

if(r > 2.5 && a < 1.0){
dx = "Tumore attivo (override)";
}
else if(r < 1.0 && a > 1.5){
dx = "Radionecrosi (override)";
}
else if(score <= 3){
dx = "Necrosi / Pseudoprogressione";
}
else if(score <= 6){
dx = "Indeterminato";
}
else{
dx = "Tumore attivo";
}

document.getElementById("out").innerText =
"Score: " + score + "/10\n" +
"Diagnosi: " + dx;

}
</script>

</body>
</html>
