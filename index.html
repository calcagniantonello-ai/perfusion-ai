<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perfusion AI Advanced</title>

<style>
body { font-family: -apple-system; margin: 20px; }

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 16px;
}

button {
  background: black;
  color: white;
  border: none;
}

.legend {
  font-size: 12px;
  color: #666;
  margin-top: -4px;
  margin-bottom: 8px;
}

.result {
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  white-space: pre-line;
}

.green { background: #e7f7ea; }
.yellow { background: #fff6d6; }
.red { background: #ffe5e5; }
</style>
</head>

<body>

<h2>Perfusion AI Advanced</h2>

<input id="rbv" placeholder="rCBV">
<div class="legend">rCBV: volume ematico relativo (rapporto adimensionale, tipico 0.5–5.0)</div>

<input id="ktrans" placeholder="Ktrans">
<div class="legend">Ktrans: permeabilità BBB (min⁻¹)</div>

<input id="adc" placeholder="ADC">
<div class="legend">ADC (×10⁻³ mm²/s)</div>

<input id="weeks" placeholder="Settimane RT">
<div class="legend">Tempo da radioterapia (settimane)</div>

<select id="trend">
<option value="stable">stable</option>
<option value="up">up</option>
<option value="down">down</option>
</select>
<div class="legend">Trend evolutivo clinico/radiologico</div>

<button onclick="calc()">Analizza</button>

<div id="out" class="result"></div>

<script>

// converte "No" in null
function parseValue(v){
  if(!v || v.toLowerCase() === "no"){
    return null;
  }
  return parseFloat(v);
}

function calc(){

let r = parseValue(document.getElementById("rbv").value);
let k = parseValue(document.getElementById("ktrans").value);
let a = parseValue(document.getElementById("adc").value);
let wRaw = document.getElementById("weeks").value;
let t = document.getElementById("trend").value;

let score = 0;
let used = 0;

// rCBV
if(r !== null){
  used++;
  if(r < 1) score += 0;
  else if(r < 1.75) score += 1;
  else if(r < 2.5) score += 2;
  else score += 3;
}

// Ktrans
if(k !== null){
  used++;
  if(k < 0.05) score += 0;
  else if(k < 0.1) score += 1;
  else if(k < 0.2) score += 2;
  else score += 3;
}

// ADC
if(a !== null){
  used++;
  if(a > 1.4) score += 0;
  else if(a > 1.2) score += 1;
  else if(a > 1.0) score += 2;
  else score += 3;
}

// settimane RT
let w = parseInt(wRaw);
if(!isNaN(w)){
  used++;
  if(w < 12) score -= 1;
}

// trend
if(t === "up") score += 1;
if(t === "down") score -= 1;

// gestione dati insufficienti
if(used === 0){
  document.getElementById("out").className = "result yellow";
  document.getElementById("out").innerText =
  "Dati insufficienti per la valutazione";
  return;
}

// diagnosi base
let dx = "";
let cls = "yellow";
let tumorProb = Math.min(95, Math.max(5, score * 12));
let necrosisProb = 100 - tumorProb;

// override biologici
if(r !== null && a !== null && r > 2.5 && a < 1.0){
dx = "Tumore attivo (override biologico)";
cls = "red";
tumorProb = 90;
necrosisProb = 10;
}
else if(r !== null && a !== null && r < 1.0 && a > 1.5){
dx = "Radionecrosi (override biologico)";
cls = "green";
tumorProb = 10;
necrosisProb = 90;
}
else if(score <= 3){
dx = "Necrosi / Pseudoprogressione";
cls = "green";
}
else if(score <= 6){
dx = "Indeterminato";
cls = "yellow";
}
else{
dx = "Probabile progressione tumorale";
cls = "red";
}

// warning semplici
let warnings = [];

if(r !== null && r > 3.5) warnings.push("rCBV elevato");
if(a !== null && a < 0.8) warnings.push("ADC molto basso");
if(k !== null && k > 0.25) warnings.push("Ktrans elevato");
if(!isNaN(w) && w < 6) warnings.push("Post-RT precoce");

let warningText = warnings.length ? "\nWARNING:\n- " + warnings.join("\n- ") : "";

// output finale
document.getElementById("out").className = "result " + cls;

document.getElementById("out").innerText =
"PERFUSION AI ADVANCED\n\n" +
"Diagnosi: " + dx + "\n" +
"Score: " + score + "/10\n\n" +
"Probabilità tumore: " + tumorProb + "%\n" +
"Probabilità necrosi: " + necrosisProb + "%\n" +
"Parametri utilizzati: " + used +
warningText;

}
</script>

</body>
</html>
